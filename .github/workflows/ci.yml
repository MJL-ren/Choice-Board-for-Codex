name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python and browser regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install official skill validator dependency
        run: python -m pip install PyYAML==6.0.2

      - name: Validate installable skill structure
        run: python tests/run_official_skill_validator.py

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run browser regressions
        run: npm run test:browser

  windows-smoke:
    name: Windows renderer, callback, and activation smoke
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"

      - name: Run Windows path and envelope regressions
        run: |
          python -m unittest discover -s tests -p "test_activation.py" -v
          python -m unittest discover -s tests -p "test_render_board.py" -v
          python -m unittest discover -s tests -p "test_branch_rules.py" -v
          python -m unittest discover -s tests -p "test_validate_envelope.py" -v
